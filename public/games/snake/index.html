<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Classic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; color: #e2e8f0; }
  h1 { font-size: 1.2rem; margin-bottom: 8px; color: #a78bfa; }
  #score { font-size: 1rem; margin-bottom: 12px; color: #94a3b8; }
  canvas { border: 2px solid #2a2a3a; border-radius: 8px; display: block; }
  #msg { margin-top: 12px; color: #64748b; font-size: 0.85rem; }
  #game-over { display: none; margin-top: 10px; text-align: center; }
  #game-over p { color: #f87171; font-size: 1rem; margin-bottom: 8px; }
  button { background: #7c3aed; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
<h1>🐍 Snake Classic</h1>
<div id="score">점수: 0</div>
<canvas id="canvas" width="360" height="360"></canvas>
<div id="msg">방향키로 조작하세요</div>
<div id="game-over">
  <p>게임 오버!</p>
  <button onclick="startGame()">다시 시작</button>
</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const CELL = 20, COLS = 18, ROWS = 18;
let snake, dir, food, score, running, loop;

function startGame() {
  snake = [{x:9, y:9}];
  dir = {x:1, y:0};
  score = 0;
  running = true;
  document.getElementById('game-over').style.display = 'none';
  document.getElementById('score').textContent = '점수: 0';
  placeFood();
  clearInterval(loop);
  loop = setInterval(tick, 120);
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (snake.some(s => s.x===food.x && s.y===food.y));
}

function tick() {
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    clearInterval(loop);
    running = false;
    document.getElementById('game-over').style.display = 'block';
    return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score += 10;
    document.getElementById('score').textContent = '점수: ' + score;
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#0f0f13';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid dots
  ctx.fillStyle = '#1a1a24';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) {
    ctx.fillRect(x*CELL+CELL/2-1, y*CELL+CELL/2-1, 2, 2);
  }
  // Food
  ctx.fillStyle = '#f87171';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  // Snake
  snake.forEach((seg, i) => {
    ctx.fillStyle = i===0 ? '#a78bfa' : '#7c3aed';
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+1, seg.y*CELL+1, CELL-2, CELL-2, 4);
    ctx.fill();
  });
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0}};
  if (map[e.key] && !(map[e.key].x===-dir.x && map[e.key].y===-dir.y)) {
    dir = map[e.key];
    e.preventDefault();
  }
});

startGame();
</script>
</body>
</html>
