<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f13;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: #e2e8f0;
    user-select: none;
  }
  h1 { font-size: 1.3rem; color: #a78bfa; margin-bottom: 10px; letter-spacing: 2px; }
  #wrapper {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    transform-origin: top center;
  }
  canvas {
    border: 2px solid #2a2a3a;
    border-radius: 8px;
    display: block;
  }
  #sidebar {
    width: 110px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .panel {
    background: #1a1a24;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px;
  }
  .panel-label {
    font-size: 0.65rem;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 6px;
  }
  .panel-value {
    font-size: 1.2rem;
    font-weight: bold;
    color: #e2e8f0;
  }
  #next-canvas {
    display: block;
    margin: 0 auto;
  }
  #level-bar {
    height: 4px;
    background: #2a2a3a;
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  #level-fill {
    height: 100%;
    background: #7c3aed;
    border-radius: 2px;
    transition: width 0.3s;
  }
  #controls {
    font-size: 0.7rem;
    color: #475569;
    line-height: 1.8;
  }
  #overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #overlay-box {
    background: #1a1a24;
    border: 2px solid #7c3aed;
    border-radius: 14px;
    padding: 28px 36px;
    text-align: center;
  }
  #overlay-title { font-size: 1.6rem; font-weight: bold; color: #a78bfa; margin-bottom: 6px; }
  #overlay-score { font-size: 1rem; color: #94a3b8; margin-bottom: 20px; }
  #overlay button {
    background: #7c3aed;
    color: white;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: bold;
  }
  #overlay button:hover { background: #6d28d9; }
</style>
</head>
<body>
<h1>🟪 TETRIS</h1>
<div id="wrapper">
  <canvas id="canvas" width="200" height="400"></canvas>
  <div id="sidebar">
    <div class="panel">
      <div class="panel-label">점수</div>
      <div class="panel-value" id="score-val">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">레벨</div>
      <div class="panel-value" id="level-val">1</div>
      <div id="level-bar"><div id="level-fill" style="width:0%"></div></div>
    </div>
    <div class="panel">
      <div class="panel-label">라인</div>
      <div class="panel-value" id="lines-val">0</div>
    </div>
    <div class="panel">
      <div class="panel-label">다음</div>
      <canvas id="next-canvas" width="80" height="80"></canvas>
    </div>
    <div class="panel controls" id="controls">
      ← → 이동<br>
      ↑ 회전<br>
      ↓ 소프트드롭<br>
      Space 하드드롭<br>
      P 일시정지
    </div>
  </div>
</div>

<div id="overlay">
  <div id="overlay-box">
    <div id="overlay-title">🟪 TETRIS</div>
    <div id="overlay-score">스페이스 / 클릭으로 시작</div>
    <button id="overlay-btn" onclick="startGame()">시작</button>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, CELL = 20;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const nctx = document.getElementById('next-canvas').getContext('2d');

const PIECES = [
  { shape: [[1,1,1,1]], color: '#22d3ee' },          // I
  { shape: [[1,1],[1,1]], color: '#fbbf24' },          // O
  { shape: [[0,1,0],[1,1,1]], color: '#a78bfa' },      // T
  { shape: [[0,1,1],[1,1,0]], color: '#34d399' },      // S
  { shape: [[1,1,0],[0,1,1]], color: '#f87171' },      // Z
  { shape: [[1,0,0],[1,1,1]], color: '#60a5fa' },      // J
  { shape: [[0,0,1],[1,1,1]], color: '#fb923c' },      // L
];

let board, current, next, score, lines, level, gameRunning, paused, dropTimer, dropInterval;

function newPiece() {
  const p = PIECES[Math.floor(Math.random() * PIECES.length)];
  return {
    shape: p.shape,
    color: p.color,
    x: Math.floor((COLS - p.shape[0].length) / 2),
    y: 0,
  };
}

function rotate(shape) {
  return shape[0].map((_, i) => shape.map(row => row[i]).reverse());
}

function valid(piece, ox = 0, oy = 0, shape = piece.shape) {
  return shape.every((row, dy) =>
    row.every((cell, dx) => {
      if (!cell) return true;
      const nx = piece.x + dx + ox, ny = piece.y + dy + oy;
      return nx >= 0 && nx < COLS && ny < ROWS && (ny < 0 || !board[ny][nx]);
    })
  );
}

function place() {
  current.shape.forEach((row, dy) =>
    row.forEach((cell, dx) => {
      if (cell && current.y + dy >= 0)
        board[current.y + dy][current.x + dx] = current.color;
    })
  );
  clearLines();
  current = next;
  next = newPiece();
  if (!valid(current)) { endGame(); return; }
  drawNext();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      cleared++; r++;
    }
  }
  if (!cleared) return;
  const pts = [0, 100, 300, 500, 800][cleared] * level;
  score += pts;
  lines += cleared;
  level = Math.floor(lines / 10) + 1;
  dropInterval = Math.max(80, 500 - (level - 1) * 45);
  document.getElementById('score-val').textContent = score;
  document.getElementById('lines-val').textContent = lines;
  document.getElementById('level-val').textContent = level;
  document.getElementById('level-fill').style.width = ((lines % 10) * 10) + '%';
}

function hardDrop() {
  while (valid(current, 0, 1)) current.y++;
  place();
}

function ghostY() {
  let gy = current.y;
  while (valid(current, 0, gy - current.y + 1)) gy++;
  return gy;
}

function drawCell(c, x, y, alpha = 1) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle = c;
  ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, 4);
  ctx.globalAlpha = 1;
}

function draw() {
  ctx.fillStyle = '#0f0f13';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Grid
  ctx.strokeStyle = '#1a1a24';
  ctx.lineWidth = 0.5;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    ctx.strokeRect(c * CELL, r * CELL, CELL, CELL);
  }
  // Board
  board.forEach((row, r) => row.forEach((cell, c) => {
    if (cell) drawCell(cell, c, r);
  }));
  // Ghost
  const gy = ghostY();
  if (gy !== current.y) {
    current.shape.forEach((row, dy) => row.forEach((cell, dx) => {
      if (cell) drawCell(current.color, current.x + dx, gy + dy, 0.2);
    }));
  }
  // Current piece
  current.shape.forEach((row, dy) => row.forEach((cell, dx) => {
    if (cell) drawCell(current.color, current.x + dx, current.y + dy);
  }));
}

function drawNext() {
  nctx.fillStyle = '#1a1a24';
  nctx.fillRect(0, 0, 80, 80);
  const s = next.shape, nc = 16;
  const ox = Math.floor((4 - s[0].length) / 2);
  const oy = Math.floor((4 - s.length) / 2);
  s.forEach((row, dy) => row.forEach((cell, dx) => {
    if (!cell) return;
    nctx.fillStyle = next.color;
    nctx.fillRect((ox + dx) * nc + 1, (oy + dy) * nc + 1, nc - 2, nc - 2);
    nctx.fillStyle = 'rgba(255,255,255,0.15)';
    nctx.fillRect((ox + dx) * nc + 1, (oy + dy) * nc + 1, nc - 2, 3);
  }));
}

function gameLoop(ts) {
  if (!gameRunning || paused) return;
  if (ts - dropTimer > dropInterval) {
    if (valid(current, 0, 1)) current.y++;
    else place();
    dropTimer = ts;
  }
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  board = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
  score = 0; lines = 0; level = 1; dropInterval = 500; paused = false;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('lines-val').textContent = '0';
  document.getElementById('level-val').textContent = '1';
  document.getElementById('level-fill').style.width = '0%';
  document.getElementById('overlay').style.display = 'none';
  current = newPiece();
  next = newPiece();
  drawNext();
  gameRunning = true;
  dropTimer = 0;
  requestAnimationFrame(ts => { dropTimer = ts; requestAnimationFrame(gameLoop); });
}

function endGame() {
  gameRunning = false;
  document.getElementById('overlay-title').textContent = '게임 오버';
  document.getElementById('overlay-score').textContent = `점수: ${score} | 라인: ${lines}`;
  document.getElementById('overlay-btn').textContent = '다시 시작';
  document.getElementById('overlay').style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (!gameRunning) return;
  if (e.key === 'p' || e.key === 'P') {
    paused = !paused;
    if (!paused) requestAnimationFrame(gameLoop);
    return;
  }
  if (paused) return;
  switch (e.key) {
    case 'ArrowLeft':  if (valid(current, -1, 0)) current.x--; break;
    case 'ArrowRight': if (valid(current, 1, 0)) current.x++; break;
    case 'ArrowDown':  if (valid(current, 0, 1)) current.y++; else place(); break;
    case 'ArrowUp': {
      const r = rotate(current.shape);
      if (valid(current, 0, 0, r)) current.shape = r;
      else if (valid(current, 1, 0, r)) { current.shape = r; current.x++; }
      else if (valid(current, -1, 0, r)) { current.shape = r; current.x--; }
      break;
    }
    case ' ': hardDrop(); break;
    default: return;
  }
  e.preventDefault();
  draw();
});

// Touch swipe / tap
let tx, ty, tTime;
canvas.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX; ty = e.touches[0].clientY; tTime = Date.now();
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', e => {
  if (!gameRunning || paused) return;
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  const dt = Date.now() - tTime;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10 && dt < 200) {
    const r = rotate(current.shape);
    if (valid(current, 0, 0, r)) current.shape = r;
  } else if (Math.abs(dx) > Math.abs(dy)) {
    if (dx > 20 && valid(current, 1, 0)) current.x++;
    else if (dx < -20 && valid(current, -1, 0)) current.x--;
  } else {
    if (dy > 20) hardDrop();
  }
  draw();
  e.preventDefault();
}, { passive: false });

// wrapper를 viewport에 맞게 스케일
function scaleWrapper() {
  const wrapper = document.getElementById('wrapper');
  // wrapper 고유 크기: canvas(200) + gap(16) + sidebar(110) = 326 x canvas(400)
  const NATIVE_W = 326, NATIVE_H = 400;
  const avW = window.innerWidth  - 16;
  const avH = window.innerHeight - 60; // h1 높이 제외
  const scale = Math.min(avW / NATIVE_W, avH / NATIVE_H);
  wrapper.style.transform = `scale(${scale})`;
}
scaleWrapper();
window.addEventListener('resize', scaleWrapper);
</script>
</body>
</html>
