function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h);ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

function computePath(waypoints){
  const tileSet=new Set(), px=[];
  for(let i=0;i<waypoints.length-1;i++){
    const [c0,r0]=waypoints[i],[c1,r1]=waypoints[i+1];
    if(r0===r1){
      const s=c1>c0?1:-1;
      for(let c=c0;c!==c1;c+=s){
        const k=`${c},${r0}`;
        if(!tileSet.has(k)){tileSet.add(k);px.push({x:c*TILE+TILE/2,y:r0*TILE+TILE/2+GY});}
      }
    } else {
      const s=r1>r0?1:-1;
      for(let r=r0;r!==r1;r+=s){
        const k=`${c0},${r}`;
        if(!tileSet.has(k)){tileSet.add(k);px.push({x:c0*TILE+TILE/2,y:r*TILE+TILE/2+GY});}
      }
    }
  }
  const [lc,lr]=waypoints[waypoints.length-1];
  const lk=`${lc},${lr}`;
  if(!tileSet.has(lk)){tileSet.add(lk);px.push({x:lc*TILE+TILE/2,y:lr*TILE+TILE/2+GY});}
  return {tileSet,px};
}

function dist2(ax,ay,bx,by){return(ax-bx)**2+(ay-by)**2;}

/* ── Enemy sprites ── */
function drawEnemySprite(e){
  const {x,y,type,sz}=e;
  ctx.save(); ctx.translate(x,y);

  if(type==='basic'){
    // 오렌지 고블린
    const g=ctx.createRadialGradient(-sz*.25,-sz*.25,sz*.05,0,0,sz);
    g.addColorStop(0,'#ffbe76'); g.addColorStop(1,'#f0932b');
    // 귀
    ctx.fillStyle='#d68910';
    ctx.beginPath();ctx.ellipse(-sz*.8,-sz*.3,sz*.3,sz*.22,-.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( sz*.8,-sz*.3,sz*.3,sz*.22, .3,0,Math.PI*2);ctx.fill();
    // 몸통
    ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.25)';ctx.lineWidth=1;ctx.stroke();
    // 흰 눈
    ctx.fillStyle='white';
    ctx.beginPath();ctx.ellipse(-sz*.3,-sz*.1,sz*.28,sz*.28,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( sz*.3,-sz*.1,sz*.28,sz*.28,0,0,Math.PI*2);ctx.fill();
    // 동공
    ctx.fillStyle='#2d3436';
    ctx.beginPath();ctx.arc(-sz*.29,-sz*.1,sz*.14,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( sz*.29,-sz*.1,sz*.14,0,Math.PI*2);ctx.fill();
    // 하이라이트
    ctx.fillStyle='white';
    ctx.beginPath();ctx.arc(-sz*.22,-sz*.18,sz*.07,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( sz*.35,-sz*.18,sz*.07,0,Math.PI*2);ctx.fill();
    // 입
    ctx.strokeStyle='#6d2f00';ctx.lineWidth=sz*.12;ctx.lineCap='round';
    ctx.beginPath();ctx.arc(0,sz*.28,sz*.3,.15,Math.PI-.15);ctx.stroke();

  } else if(type==='fast'){
    // 노란 번개 크리처 — 가로로 약간 길쭉
    const g=ctx.createRadialGradient(-sz*.2,-sz*.3,sz*.05,0,0,sz);
    g.addColorStop(0,'#fff200'); g.addColorStop(1,'#f9ca24');
    // 잔상 트레일
    ctx.globalAlpha=.22;ctx.fillStyle='#f9ca24';
    ctx.beginPath();ctx.ellipse(-sz*1.15,0,sz*.85,sz*.3,-.05,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
    // 몸통
    ctx.beginPath();ctx.ellipse(0,0,sz*1.1,sz,0,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.2)';ctx.lineWidth=1;ctx.stroke();
    // 흰 눈
    ctx.fillStyle='white';
    ctx.beginPath();ctx.ellipse(-sz*.3,-sz*.08,sz*.28,sz*.22,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( sz*.3,-sz*.08,sz*.28,sz*.22,0,0,Math.PI*2);ctx.fill();
    // 찡그린 눈썹
    ctx.strokeStyle='#e17055';ctx.lineWidth=sz*.13;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-sz*.52,-sz*.25);ctx.lineTo(-sz*.08,-sz*.22);ctx.stroke();
    ctx.beginPath();ctx.moveTo( sz*.08,-sz*.22);ctx.lineTo( sz*.52,-sz*.25);ctx.stroke();
    // 동공
    ctx.fillStyle='#2d3436';
    ctx.beginPath();ctx.arc(-sz*.3,-sz*.08,sz*.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( sz*.3,-sz*.08,sz*.12,0,Math.PI*2);ctx.fill();
    // 비뚤어진 입
    ctx.strokeStyle='#5d4037';ctx.lineWidth=sz*.1;
    ctx.beginPath();ctx.moveTo(-sz*.22,sz*.25);ctx.lineTo(sz*.28,sz*.2);ctx.stroke();
    // 번개 마크
    ctx.fillStyle='#f39c12';
    ctx.beginPath();
    ctx.moveTo(sz*.5,-sz*.55);ctx.lineTo(sz*.2,-sz*.05);ctx.lineTo(sz*.4,-sz*.05);
    ctx.lineTo(sz*.1, sz*.45);ctx.lineTo(sz*.55,-sz*.05);ctx.lineTo(sz*.35,-sz*.05);ctx.closePath();
    ctx.fill();

  } else if(type==='tank'){
    // 보라 중장갑 기사
    const g=ctx.createRadialGradient(-sz*.2,-sz*.25,sz*.1,0,0,sz);
    g.addColorStop(0,'#a29bfe'); g.addColorStop(1,'#6c5ce7');
    // 갑옷 외곽
    ctx.fillStyle='#4d3a9e';
    ctx.beginPath();ctx.arc(0,0,sz*1.07,0,Math.PI*2);ctx.fill();
    // 몸통
    ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    // 갑옷 선
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=sz*.1;
    ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(sz,0);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,sz*.55,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);ctx.stroke();
    // 투구
    ctx.fillStyle='#4d3a9e';
    ctx.beginPath();
    ctx.moveTo(-sz*.52,-sz*.62);
    ctx.quadraticCurveTo(0,-sz*1.35,sz*.52,-sz*.62);
    ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(160,155,254,.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,-sz*.9,sz*.4,Math.PI*1.1,Math.PI*1.9);ctx.stroke();
    // 분노 눈
    ctx.fillStyle='#ff4757';
    ctx.beginPath();ctx.ellipse(-sz*.3,-sz*.1,sz*.3,sz*.2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( sz*.3,-sz*.1,sz*.3,sz*.2,0,0,Math.PI*2);ctx.fill();
    // 눈썹
    ctx.strokeStyle='#2d3436';ctx.lineWidth=sz*.15;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-sz*.55,-sz*.35);ctx.lineTo(-sz*.06,-sz*.3);ctx.stroke();
    ctx.beginPath();ctx.moveTo( sz*.55,-sz*.35);ctx.lineTo( sz*.06,-sz*.3);ctx.stroke();
    // 동공
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.arc(-sz*.3,-sz*.12,sz*.12,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc( sz*.3,-sz*.12,sz*.12,0,Math.PI*2);ctx.fill();
    // 굳게 다문 입
    ctx.strokeStyle='#2d3436';ctx.lineWidth=sz*.1;
    ctx.beginPath();ctx.moveTo(-sz*.3,sz*.32);ctx.lineTo(sz*.3,sz*.32);ctx.stroke();

  } else if(type==='boss'){
    // 붉은 악마 보스
    ctx.shadowColor='#ff4757';ctx.shadowBlur=18;
    const g=ctx.createRadialGradient(-sz*.25,-sz*.25,sz*.1,0,0,sz);
    g.addColorStop(0,'#ff6b81'); g.addColorStop(.6,'#ff4757'); g.addColorStop(1,'#c0392b');
    // 날개
    ctx.fillStyle='rgba(160,20,20,.65)';
    ctx.beginPath();
    ctx.moveTo(0,-sz*.3);
    ctx.bezierCurveTo(-sz*1.9,-sz*.9,-sz*1.6,sz*.4,-sz*.85,sz*.65);
    ctx.closePath();ctx.fill();
    ctx.beginPath();
    ctx.moveTo(0,-sz*.3);
    ctx.bezierCurveTo( sz*1.9,-sz*.9, sz*1.6,sz*.4, sz*.85,sz*.65);
    ctx.closePath();ctx.fill();
    // 날개 선
    ctx.strokeStyle='rgba(255,100,100,.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,-sz*.3);ctx.bezierCurveTo(-sz*1.2,-sz*.4,-sz*1.4,sz*.2,-sz*.85,sz*.65);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-sz*.3);ctx.bezierCurveTo( sz*1.2,-sz*.4, sz*1.4,sz*.2, sz*.85,sz*.65);ctx.stroke();
    // 몸통
    ctx.beginPath();ctx.arc(0,0,sz,0,Math.PI*2);
    ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.45)';ctx.lineWidth=2;ctx.stroke();
    ctx.shadowBlur=0;
    // 뿔
    ctx.fillStyle='#8b0000';
    ctx.beginPath();ctx.moveTo(-sz*.52,-sz*.72);ctx.lineTo(-sz*.72,-sz*1.3);ctx.lineTo(-sz*.3,-sz*.62);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo( sz*.52,-sz*.72);ctx.lineTo( sz*.72,-sz*1.3);ctx.lineTo( sz*.3,-sz*.62);ctx.closePath();ctx.fill();
    ctx.fillStyle='#a00000';
    ctx.beginPath();ctx.moveTo(-sz*.55,-sz*.75);ctx.lineTo(-sz*.65,-sz*1.15);ctx.lineTo(-sz*.4,-sz*.7);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo( sz*.55,-sz*.75);ctx.lineTo( sz*.65,-sz*1.15);ctx.lineTo( sz*.4,-sz*.7);ctx.closePath();ctx.fill();
    // 왕관
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    ctx.moveTo(-sz*.55,-sz*.78);ctx.lineTo(-sz*.55,-sz*1.22);
    ctx.lineTo(-sz*.28,-sz*.92);ctx.lineTo(0,-sz*1.32);
    ctx.lineTo( sz*.28,-sz*.92);ctx.lineTo( sz*.55,-sz*1.22);
    ctx.lineTo( sz*.55,-sz*.78);ctx.closePath();ctx.fill();
    ctx.strokeStyle='#e6b800';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#c0392b';ctx.beginPath();ctx.arc(0,-sz*1.25,sz*.11,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4757';ctx.beginPath();ctx.arc(-sz*.37,-sz*1.12,sz*.07,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#ff4757';ctx.beginPath();ctx.arc( sz*.37,-sz*1.12,sz*.07,0,Math.PI*2);ctx.fill();
    // 빛나는 눈
    ctx.shadowColor='#fff200';ctx.shadowBlur=10;
    ctx.fillStyle='#fff200';
    ctx.beginPath();ctx.ellipse(-sz*.3,-sz*.1,sz*.3,sz*.22,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse( sz*.3,-sz*.1,sz*.3,sz*.22,0,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;

function drawTowerSprite(t,sel){

    ctx.fillStyle='rgba(255,255,255,.2)';ctx.beginPath();ctx.arc(-1.5,-1.5,2,0,Math.PI*2);ctx.fill();

// ══════════════════════════════════════════════════════
//  CLASSES
// ══════════════════════════════════════════════════════
class Enemy{
  constructor(type,pathPx,baseHp,baseSpeed,rwm){
    const d=EDEFS[type];
    this.type=type; this.d=d;
    this.hp=baseHp*d.hm; this.maxHp=this.hp;
    this.speed=baseSpeed*d.sm;
    this.reward=Math.round(d.rw*(rwm||1)); this.sz=d.sz; this.clr=d.clr;
    this.path=pathPx; this.pi=0;
    this.x=pathPx[0].x; this.y=pathPx[0].y;
    this.dead=false; this.reached=false;
    this.slow=1.0; this.slowT=0;
  }
  update(dt){
    if(this.dead||this.reached)return;
    if(this.slowT>0){this.slowT-=dt;if(this.slowT<=0)this.slow=1.0;}

    // 앞 적을 따라잡으면 속도 맞추기 → 자연스럽게 뭉침
    let effectiveSpeed=this.speed*this.slow;
    const BUNCH_DIST=18; // 이 거리 이내면 앞 적 속도로 제한
    for(const o of enemies){
      if(o===this||o.dead||o.reached)continue;
      if(o.pi<this.pi)continue; // 뒤에 있는 적은 무시
      const dx=o.x-this.x,dy=o.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<BUNCH_DIST&&d>0){
        // 앞 적과 겹치지 않도록 속도 제한
        effectiveSpeed=Math.min(effectiveSpeed,o.speed*o.slow*(d/BUNCH_DIST));
      }
    }

    let rem=Math.max(0,effectiveSpeed)*dt;
    while(rem>0&&this.pi<this.path.length-1){
      const tgt=this.path[this.pi+1];
      const dx=tgt.x-this.x,dy=tgt.y-this.y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<=rem){this.x=tgt.x;this.y=tgt.y;this.pi++;rem-=d;}
      else{const r=rem/d;this.x+=dx*r;this.y+=dy*r;rem=0;}
    }
    if(this.pi>=this.path.length-1)this.reached=true;
  }
  hit(dmg){
    this.hp-=dmg;
    if(this.hp<=0){this.dead=true;return true;}
    return false;
  }
  applySlot(factor,dur){
    this.slow=Math.min(this.slow,factor);
    this.slowT=Math.max(this.slowT,dur);
  }
  draw(){
    if(this.dead||this.reached)return;
    // 슬로우 얼음 링
    if(this.slow<1.0){
      ctx.save();
      ctx.strokeStyle='rgba(116,185,255,.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(this.x,this.y,this.sz+5,0,Math.PI*2);ctx.stroke();
      // 작은 얼음 파편
      for(let i=0;i<4;i++){
        const a=i*Math.PI/2+((animT||0)*.001);
        const ex=this.x+Math.cos(a)*(this.sz+8);
        const ey=this.y+Math.sin(a)*(this.sz+8);
        ctx.strokeStyle='#74b9ff';ctx.lineWidth=1.2;
        ctx.beginPath();ctx.moveTo(ex-2,ey);ctx.lineTo(ex+2,ey);ctx.stroke();
        ctx.beginPath();ctx.moveTo(ex,ey-2);ctx.lineTo(ex,ey+2);ctx.stroke();
      }
      ctx.restore();
    }
    // 스프라이트
    drawEnemySprite(this);
    // HP 바
    const bw=this.sz*2+8,bh=4,bx=this.x-bw/2,by=this.y-this.sz-10;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(bx-1,by-1,bw+2,bh+2);
    ctx.fillStyle='#333';ctx.fillRect(bx,by,bw,bh);
    const pct=this.hp/this.maxHp;
    ctx.fillStyle=pct>.5?'#2ecc71':pct>.25?'#f39c12':'#e74c3c';
    ctx.fillRect(bx,by,bw*pct,bh);
    // HP 바 테두리
    ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=.5;ctx.strokeRect(bx,by,bw,bh);
    ctx.restore();
  }
}

class Tower{
  constructor(col,row,type){
    this.col=col; this.row=row; this.type=type; this.lv=0;
    this.x=col*TILE+TILE/2; this.y=row*TILE+TILE/2+GY;
    this.cd=0; this.angle=-Math.PI/2;
    this.spent=this.stats.cost;
  }
  get def(){return TDEFS[this.type];}
  get stats(){return this.def.lv[this.lv];}
  update(dt){
    if(this.cd>0)this.cd-=dt;
    const rng=this.stats.rng*TILE, rng2=rng*rng;
    let best=null;

    if(this.type==='cannon'){
      // 대포: 스플래시 범위 내 적이 가장 많이 모인 지점을 타겟
      const spl=(this.stats.spl||1.3)*TILE, spl2=spl*spl;
      let bestCount=-1, bestPi=-1;
      for(const e of enemies){
        if(e.dead||e.reached)continue;
        if(dist2(e.x,e.y,this.x,this.y)>rng2)continue;
        // 이 적 주변에 스플래시 범위 내 적 수 세기
        let cnt=0;
        for(const e2 of enemies){
          if(e2.dead||e2.reached)continue;
          if(dist2(e2.x,e2.y,e.x,e.y)<=spl2)cnt++;
        }
        // 밀집도 우선, 동률이면 경로 진행도 우선
        if(cnt>bestCount||(cnt===bestCount&&e.pi>bestPi)){
          best=e; bestCount=cnt; bestPi=e.pi;
        }
      }
    } else {
      // 궁수·얼음: 경로에서 가장 앞선 적 타겟
      let bestPi=-1;
      for(const e of enemies){
        if(e.dead||e.reached)continue;
        if(dist2(e.x,e.y,this.x,this.y)<=rng2&&e.pi>bestPi){best=e;bestPi=e.pi;}
      }
    }

    if(best&&this.cd<=0){
      this.angle=Math.atan2(best.y-this.y,best.x-this.x);
      projectiles.push(new Projectile(this,best));
      this.cd=this.stats.rate;
    }
  }
  canUpgrade(){return this.lv<this.def.lv.length-1;}
  upgradeCost(){return this.canUpgrade()?this.def.lv[this.lv+1].cost:0;}
  upgrade(){
    if(this.canUpgrade()&&gold>=this.upgradeCost()){
      const c=this.upgradeCost(); gold-=c; this.spent+=c; this.lv++;return true;
    }return false;
  }
  sellValue(){return Math.floor(this.spent*0.6);}
  draw(sel){ drawTowerSprite(this,sel); }
}

class Projectile{
  constructor(tower,target){
    this.x=tower.x; this.y=tower.y;
    this.target=target; this.type=tower.type;
    this.dmg=tower.stats.dmg;
    this.spd=220;
    this.spl=(tower.stats.spl||0)*TILE;
    this.slow=tower.stats.slow||0;
    this.sdur=tower.stats.sdur||0;
    this.done=false;
  }
  update(dt){
    if(this.done||!this.target||this.target.dead||this.target.reached){this.done=true;return;}
    const dx=this.target.x-this.x,dy=this.target.y-this.y;
    const d=Math.sqrt(dx*dx+dy*dy);
    const step=this.spd*dt;
    if(d<=step){this.hit();}
    else{const r=step/d;this.x+=dx*r;this.y+=dy*r;}
  }
  hit(){
    this.done=true;
    if(this.spl>0){
      // 폭발 VFX
      vfx.push({x:this.target.x,y:this.target.y,r:0,maxR:this.spl,life:1,type:'explosion'});
      let hitCount=0;
      for(const e of enemies){
        if(e.dead||e.reached)continue;
        if(dist2(e.x,e.y,this.target.x,this.target.y)<=this.spl*this.spl){
          if(e.hit(this.dmg))gold+=e.reward;
          if(this.slow>0)e.applySlot(this.slow,this.sdur);
          hitCount++;
        }
      }
      // 2마리 이상 명중 시 추가 VFX (콤보 표시)
      if(hitCount>=2){
        vfx.push({x:this.target.x,y:this.target.y-20,text:`x${hitCount}!`,life:1,type:'combo'});
      }
    } else {
      if(!this.target.dead){
        if(this.target.hit(this.dmg))gold+=this.target.reward;
        if(this.slow>0)this.target.applySlot(this.slow,this.sdur);
      }
    }
  }
  draw(){ drawProjectileSprite(this); }
}

//  GAME STATE
// ══════════════════════════════════════════════════════
let gstate='menu'; // menu|playing|stageclear|gameover
let rafId=0;
let stageId=0, gold=0, hp=0;
let enemies=[], towers=[], projectiles=[], vfx=[];
let pathTiles=new Set(), pathPx=[];
let waveIdx=0, spawnQ=[], spawnT=0, spawned=false, waveActive=false, waveDelay=0;
let selType=null, selTower=null;
let speedMult=1, prevTs=0;

// ── LocalStorage ──
function saveProgress(id){
  const cur=parseInt(localStorage.getItem('td_max')||'0');
  if(id>cur)localStorage.setItem('td_max',id);
}
function maxUnlocked(){return parseInt(localStorage.getItem('td_max')||'0')+1;}

// ── Init stage ──
function loadStage(id){
  const cfg=STAGES[id-1];
  stageId=id; gold=cfg.gold; hp=cfg.hp;
  enemies=[]; towers=[]; projectiles=[]; vfx=[];
  waveIdx=0; spawnQ=[]; spawnT=0; spawned=false; waveActive=false;
  waveDelay=2.5; selType=null; selTower=null; speedMult=1;
  const {tileSet,px}=computePath(cfg.path);
  pathTiles=tileSet; pathPx=px;
  gstate='playing';
}

function startNextWave(){
  const wdef=STAGES[stageId-1].waves[waveIdx];
  spawnQ=[]; let t=0;
  for(const g of wdef.e){for(let i=0;i<g.n;i++){spawnQ.push({type:g.t,time:t});t+=wdef.ivl;}}
  spawnT=0; spawned=false; waveActive=true; waveIdx++;
}

// ── Update ──
function updateGame(dt){
  const dt2=dt*speedMult;
  // Waves
  if(!waveActive){
    if(waveDelay>0){
      waveDelay-=dt2;
      if(waveDelay<=0&&waveIdx<STAGES[stageId-1].waves.length)startNextWave();
    }
  } else {
    if(spawnQ.length>0){
      spawnT+=dt2;
      let i=0;
      while(i<spawnQ.length&&spawnQ[i].time<=spawnT){
        const s=spawnQ[i];const cfg=STAGES[stageId-1];
        enemies.push(new Enemy(s.type,pathPx,cfg.bh,cfg.bs,cfg.rwm||1));
        i++;
      }
      spawnQ.splice(0,i);
    } else { spawned=true; }
    if(spawned&&enemies.every(e=>e.dead||e.reached)){
      waveActive=false;
      if(waveIdx>=STAGES[stageId-1].waves.length){
        saveProgress(stageId);
        gstate='stageclear';
      } else {
        waveDelay=3.5;
      }
    }
  }
  // Enemies
  for(const e of enemies)e.update(dt2);
  // HP loss
  for(const e of enemies){
    if(e.reached&&!e._counted){e._counted=true;hp--;if(hp<=0){gstate='gameover';}}
  }
  enemies=enemies.filter(e=>!e.dead);
  // Towers
  for(const t of towers)t.update(dt2);
  // Projectiles
  for(const p of projectiles)p.update(dt2);
  projectiles=projectiles.filter(p=>!p.done);
  // VFX
  for(const v of vfx){
    v.life-=dt2*2.2;
    if(v.type==='explosion')v.r=v.maxR*(1-v.life);
  }
  vfx=vfx.filter(v=>v.life>0);
}

// ══════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════
let animT=0;

function render(ts){
  animT=ts;
  ctx.clearRect(0,0,CW,CH);
  if(gstate==='menu'){drawMenu();return;}
  drawGrid();
  for(const t of towers)t.draw(selTower===t);
  for(const e of enemies)e.draw();
  for(const p of projectiles)p.draw();
  // Draw VFX
  for(const v of vfx){
    if(v.type==='explosion'){
      ctx.save();
      ctx.globalAlpha=v.life*0.7;
      ctx.strokeStyle='#e17055';
      ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(v.x,v.y,v.r,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=v.life*0.25;
      ctx.fillStyle='#ffd700';
      ctx.beginPath();ctx.arc(v.x,v.y,v.r*0.6,0,Math.PI*2);ctx.fill();
      ctx.restore();
    } else if(v.type==='combo'){
      ctx.save();
      ctx.globalAlpha=v.life;
      const sz=14+Math.floor((1-v.life)*6);
      ctx.font=`bold ${sz}px Arial`;
      ctx.fillStyle='#ffd700';
      ctx.strokeStyle='#000';
      ctx.lineWidth=2;
      ctx.textAlign='center';ctx.textBaseline='middle';
      const ty=v.y-(1-v.life)*20;
      ctx.strokeText(v.text,v.x,ty);
      ctx.fillText(v.text,v.x,ty);
      ctx.restore();
    }
  }
  drawHUD();
  drawBottomPanel();
  if(gstate==='stageclear')drawStageClear();
  if(gstate==='gameover')drawGameOver();
}

// ── Grid ──
function drawGrid(){
  for(let r=0;r<GR;r++){
    for(let c=0;c<GC;c++){
      const x=c*TILE, y=r*TILE+GY;
      const isPath=pathTiles.has(`${c},${r}`);
      const hasTower=towers.some(t=>t.col===c&&t.row===r);
      if(isPath){
        ctx.fillStyle='#3d2b1a'; ctx.fillRect(x,y,TILE,TILE);
        // Subtle dirt texture
        ctx.fillStyle='rgba(80,50,20,0.3)';
        ctx.fillRect(x+2,y+2,TILE-4,TILE-4);
      } else {
        ctx.fillStyle=hasTower?'#2c2c2c':'#1e2d1e';
        ctx.fillRect(x,y,TILE,TILE);
        if(!hasTower&&selType){
          // Hover target hint - just show buildable grid
          ctx.strokeStyle='rgba(100,255,100,0.08)';
          ctx.lineWidth=0.5;
          ctx.strokeRect(x+1,y+1,TILE-2,TILE-2);
        }
      }
      // Grid lines
      ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=0.5;
      ctx.strokeRect(x,y,TILE,TILE);
    }
  }
  // Path direction arrows (every 3 tiles)
  ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#8b6914';
  for(let i=2;i<pathPx.length-1;i+=3){
    const a=pathPx[i],b=pathPx[i+1]||pathPx[i];
    const angle=Math.atan2(b.y-a.y,b.x-a.x);
    ctx.save();ctx.translate(a.x,a.y);ctx.rotate(angle);
    ctx.beginPath();ctx.moveTo(6,0);ctx.lineTo(-4,-4);ctx.lineTo(-4,4);ctx.closePath();
    ctx.fill();ctx.restore();
  }
  ctx.restore();
}

}

function getCanvasPos(e){
  const rect=CV.getBoundingClientRect();
  const cx2=(e.clientX??e.touches[0].clientX)-rect.left;
  const cy2=(e.clientY??e.touches[0].clientY)-rect.top;
  return{x:cx2*(CW/rect.width), y:cy2*(CH/rect.height)};
}

function handlePointer(px,py){
  // ── Menu ──
  if(gstate==='menu'){
    const max=maxUnlocked();
    const BW=82,BH=60,COLS=5,SX=(CW-BW*COLS)/2,SY=75;
    for(let i=0;i<15;i++){
      const col=i%COLS,row=Math.floor(i/COLS);
      const x=SX+col*(BW+4),y=SY+row*(BH+6);
      const sid=i+1;
      if(sid<=max&&px>=x&&px<=x+BW&&py>=y&&py<=y+BH){
        loadStage(sid);return;
      }
    }
    return;
  }

  // ── Stage Clear ──
  if(gstate==='stageclear'){
    if(stageId<15&&py>=CH*0.64&&py<=CH*0.64+44&&px>=CW/2-100&&px<=CW/2+100){
      loadStage(stageId+1);return;
    }
    if(py>=CH*0.74&&py<=CH*0.74+44&&px>=CW/2-100&&px<=CW/2+100){gstate='menu';return;}
    return;
  }

  // ── Game Over ──
  if(gstate==='gameover'){
    if(py>=CH*0.56&&py<=CH*0.56+44&&px>=CW/2-100&&px<=CW/2+100){loadStage(stageId);return;}
    if(py>=CH*0.67&&py<=CH*0.67+44&&px>=CW/2-100&&px<=CW/2+100){gstate='menu';return;}
    return;
  }

  // ── Playing ──
  if(gstate!=='playing')return;

  // Speed toggle
  const sx=CW-58,sy=BP+12;
  if(px>=sx&&px<=sx+52&&py>=sy&&py<=sy+36){
    speedMult=speedMult===1?2:1;return;
  }

  // Bottom panel: tower shop or tower info
  if(py>=BP){
    if(selTower){
      // Upgrade button
      if(px>=8&&px<=138&&py>=BP+44&&py<=BP+74){
        if(selTower.canUpgrade())selTower.upgrade();
        return;
      }
      // Sell button
      if(px>=150&&px<=280&&py>=BP+44&&py<=BP+74){
        gold+=selTower.sellValue();
        towers=towers.filter(t=>t!==selTower);
        selTower=null;return;
      }
      // Close button
      if(px>=292&&px<=352&&py>=BP+44&&py<=BP+74){selTower=null;return;}
    } else {
      // Tower type buttons
      const BTN_W=90,startX=(CW-BTN_W*3)/2;
      for(let i=0;i<3;i++){
        const bx=startX+i*BTN_W;
        if(px>=bx+2&&px<=bx+BTN_W-2&&py>=BTN_Y&&py<=BTN_Y+BTN_H){
          const t=TTYPES[i];
          selType=selType===t?null:t;
          return;
        }
      }
    }
    return;
  }

  // Grid area
  if(py>=GY&&py<BP){
    const col=Math.floor(px/TILE);
    const row=Math.floor((py-GY)/TILE);
    if(col<0||col>=GC||row<0||row>=GR)return;

    // Click on existing tower
    const existing=towers.find(t=>t.col===col&&t.row===row);
    if(existing){
      selTower=selTower===existing?null:existing;
      selType=null;return;
    }

    // Place tower
    if(selType&&!pathTiles.has(`${col},${row}`)){
      const cost=TDEFS[selType].lv[0].cost;
      if(gold>=cost){
        gold-=cost;
        towers.push(new Tower(col,row,selType));
        selTower=null;
      }
    } else {
      selTower=null;
    }
  }
}

CV.addEventListener('click',e=>{const{x,y}=getCanvasPos(e);handlePointer(x,y);});
CV.addEventListener('touchend',e=>{
  e.preventDefault();
  const{x,y}=getCanvasPos(e.changedTouches[0]);handlePointer(x,y);
},{passive:false});

// ══════════════════════════════════════════════════════
//  LOOP
// ══════════════════════════════════════════════════════
function loop(ts){
  rafId=requestAnimationFrame(loop);
  const dt=Math.min((ts-prevTs)/1000,0.05);
  prevTs=ts;
  if(gstate==='playing')updateGame(dt);
  render(ts);
}
document.addEventListener('visibilitychange',()=>{
  if(document.hidden){
    cancelAnimationFrame(rafId);
  } else {
    prevTs=performance.now();
    rafId=requestAnimationFrame(loop);
  }
});

prevTs=performance.now();
rafId=requestAnimationFrame(loop);
</script>
