<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; color: #e2e8f0; user-select: none; }
  h1 { font-size: 1.5rem; color: #a78bfa; margin-bottom: 6px; }
  #info { display: flex; gap: 20px; margin-bottom: 14px; }
  .stat { text-align: center; background: #1a1a24; border-radius: 8px; padding: 6px 16px; }
  .stat-label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; }
  .stat-val { font-size: 1.1rem; font-weight: bold; color: #e2e8f0; }
  #board { display: grid; grid-template-columns: repeat(4, 80px); gap: 8px; background: #1a1a24; padding: 10px; border-radius: 12px; }
  .cell { width: 80px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.4rem; transition: all 0.1s; }
  #msg { margin-top: 12px; color: #64748b; font-size: 0.85rem; }
  button { background: #7c3aed; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; margin-top: 10px; font-size: 0.9rem; }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
<h1>2048</h1>
<div id="info">
  <div class="stat"><div class="stat-label">점수</div><div class="stat-val" id="score">0</div></div>
  <div class="stat"><div class="stat-label">최고</div><div class="stat-val" id="best">0</div></div>
</div>
<div id="board"></div>
<div id="msg">방향키로 타일을 이동하세요</div>
<button onclick="init()">새 게임</button>
<script>
const COLORS = {0:'#2a2a3a',2:'#3b3254',4:'#4a3a6b',8:'#6d28d9',16:'#7c3aed',32:'#a78bfa',64:'#c4b5fd',128:'#ddd6fe',256:'#ede9fe',512:'#f59e0b',1024:'#ef4444',2048:'#10b981'};
const TEXT_COLORS = {0:'transparent',2:'#e2e8f0',4:'#e2e8f0',8:'#fff',16:'#fff',32:'#fff',64:'#fff',128:'#1f2937',256:'#1f2937',512:'#fff',1024:'#fff',2048:'#fff'};
let grid, score, best=0;

function init() {
  grid = Array.from({length:4}, ()=>Array(4).fill(0));
  score = 0;
  addRandom(); addRandom();
  render();
}

function addRandom() {
  const empty = [];
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(!grid[r][c]) empty.push([r,c]);
  if(!empty.length) return false;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c] = Math.random()<0.9?2:4;
  return true;
}

function slide(row) {
  let arr = row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++) {
    if(arr[i]===arr[i+1]) { arr[i]*=2; score+=arr[i]; arr.splice(i+1,1); }
  }
  while(arr.length<4) arr.push(0);
  return arr;
}

function move(dir) {
  let moved = false;
  const old = grid.map(r=>[...r]);
  if(dir==='left') grid = grid.map(r=>slide(r));
  if(dir==='right') grid = grid.map(r=>slide([...r].reverse()).reverse());
  if(dir==='up'||dir==='down') {
    for(let c=0;c<4;c++) {
      let col = grid.map(r=>r[c]);
      col = dir==='up' ? slide(col) : slide([...col].reverse()).reverse();
      for(let r=0;r<4;r++) grid[r][c]=col[r];
    }
  }
  for(let r=0;r<4;r++) for(let c=0;c<4;c++) if(grid[r][c]!==old[r][c]) moved=true;
  if(moved) { addRandom(); if(score>best){best=score;} render(); }
}

function render() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  const board = document.getElementById('board');
  board.innerHTML = '';
  grid.flat().forEach(v => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.background = COLORS[v]||'#10b981';
    cell.style.color = TEXT_COLORS[v]||'#fff';
    cell.style.fontSize = v>=1000?'1rem':v>=100?'1.2rem':'1.4rem';
    cell.textContent = v||'';
    board.appendChild(cell);
  });
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if(map[e.key]) { move(map[e.key]); e.preventDefault(); }
});

// Touch support
let tx, ty;
document.addEventListener('touchstart', e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
document.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
});

init();
</script>
</body>
</html>
