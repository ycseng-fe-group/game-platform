<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Breakout</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f0f13; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: Arial, sans-serif; color: #e2e8f0; }
  h1 { font-size: 1.2rem; color: #a78bfa; margin-bottom: 6px; }
  #info { font-size: 0.9rem; color: #94a3b8; margin-bottom: 10px; }
  canvas { border: 2px solid #2a2a3a; border-radius: 8px; cursor: none; }
  #msg { margin-top: 10px; font-size: 0.85rem; color: #64748b; }
  button { background: #7c3aed; color: white; border: none; padding: 8px 20px; border-radius: 6px; cursor: pointer; margin-top: 8px; font-size: 0.9rem; }
  button:hover { background: #6d28d9; }
</style>
</head>
<body>
<h1>🧱 Breakout</h1>
<div id="info">점수: <strong id="score">0</strong> | 목숨: <strong id="lives">3</strong></div>
<canvas id="canvas" width="460" height="420"></canvas>
<div id="msg">마우스로 패들을 조종하세요</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W=460, H=420;
const BRICK_COLS=9, BRICK_ROWS=5, BRICK_W=44, BRICK_H=16, BRICK_PAD=4, BRICK_TOP=50;
let ball, bricks, score, lives, gameOver, win;
const paddle = {x:W/2-40, y:H-25, w:80, h:12};

const BRICK_COLORS = ['#f87171','#fb923c','#fbbf24','#34d399','#60a5fa','#a78bfa'];

function init() {
  ball = {x:W/2, y:H-60, dx:3, dy:-3, r:7};
  paddle.x = W/2-40;
  score=0; lives=3; gameOver=false; win=false;
  bricks = [];
  for(let r=0;r<BRICK_ROWS;r++) for(let c=0;c<BRICK_COLS;c++) {
    bricks.push({x:c*(BRICK_W+BRICK_PAD)+20, y:r*(BRICK_H+BRICK_PAD)+BRICK_TOP, alive:true, color:BRICK_COLORS[r%BRICK_COLORS.length]});
  }
  update();
}

canvas.addEventListener('mousemove', e=>{
  const rect = canvas.getBoundingClientRect();
  paddle.x = Math.max(0, Math.min(W-paddle.w, e.clientX-rect.left-paddle.w/2));
});

function update() {
  if(gameOver||win) return;
  ball.x += ball.dx; ball.y += ball.dy;
  if(ball.x<ball.r||ball.x>W-ball.r) ball.dx*=-1;
  if(ball.y<ball.r) ball.dy*=-1;
  if(ball.y>H-ball.r-paddle.h && ball.x>paddle.x && ball.x<paddle.x+paddle.w && ball.dy>0) {
    const hit=(ball.x-paddle.x-paddle.w/2)/(paddle.w/2);
    ball.dx=hit*5; ball.dy=-Math.abs(ball.dy);
  }
  if(ball.y>H) {
    lives--; document.getElementById('lives').textContent=lives;
    if(lives<=0){gameOver=true;draw();return;}
    ball={x:W/2,y:H-60,dx:3,dy:-3,r:7};
  }
  let remaining=0;
  bricks.forEach(b=>{
    if(!b.alive) return;
    remaining++;
    if(ball.x>b.x&&ball.x<b.x+BRICK_W&&ball.y>b.y&&ball.y<b.y+BRICK_H) {
      b.alive=false; ball.dy*=-1; score+=10;
      document.getElementById('score').textContent=score;
    }
  });
  if(remaining===0){win=true;}
  draw();
  requestAnimationFrame(update);
}

function draw() {
  ctx.fillStyle='#0f0f13'; ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle=b.color;
    ctx.beginPath(); ctx.roundRect(b.x,b.y,BRICK_W,BRICK_H,4); ctx.fill();
  });
  // Paddle
  ctx.fillStyle='#7c3aed';
  ctx.beginPath(); ctx.roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6); ctx.fill();
  // Ball
  ctx.fillStyle='#a78bfa';
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  if(gameOver) {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#f87171'; ctx.font='bold 28px Arial'; ctx.textAlign='center';
    ctx.fillText('게임 오버!',W/2,H/2-10);
    ctx.fillStyle='#94a3b8'; ctx.font='16px Arial';
    ctx.fillText('페이지를 새로고침하여 재시작',W/2,H/2+25);
  }
  if(win) {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#10b981'; ctx.font='bold 28px Arial'; ctx.textAlign='center';
    ctx.fillText('🏆 클리어!',W/2,H/2-10);
    ctx.fillStyle='#94a3b8'; ctx.font='16px Arial';
    ctx.fillText('점수: '+score,W/2,H/2+25);
  }
}

init();
</script>
</body>
</html>
