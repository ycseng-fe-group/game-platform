<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Floor grid -->
  <line x1="60" y1="40"  x2="340" y2="40"  stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="60" y1="80"  x2="340" y2="80"  stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="60" y1="120" x2="340" y2="120" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="60" y1="160" x2="340" y2="160" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="60" y1="200" x2="340" y2="200" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="100" y1="30" x2="100" y2="210" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="160" y1="30" x2="160" y2="210" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="220" y1="30" x2="220" y2="210" stroke="#1a1a2e" stroke-width="0.8"/>
  <line x1="280" y1="30" x2="280" y2="210" stroke="#1a1a2e" stroke-width="0.8"/>

  <!-- Outer walls (top) -->
  <rect x="55" y="25" width="290" height="20" rx="3" fill="#8b5e3c"/>
  <rect x="55" y="25" width="290" height="6" rx="2" fill="#9c6a42"/>
  <!-- Outer walls (bottom) -->
  <rect x="55" y="190" width="290" height="18" rx="3" fill="#8b5e3c"/>
  <!-- Outer walls (left) -->
  <rect x="55" y="25" width="20" height="183" rx="3" fill="#8b5e3c"/>
  <!-- Outer walls (right) -->
  <rect x="325" y="25" width="20" height="183" rx="3" fill="#8b5e3c"/>

  <!-- Internal walls -->
  <rect x="120" y="70" width="80" height="18" rx="3" fill="#7a5230"/>
  <rect x="200" y="110" width="60" height="18" rx="3" fill="#8b5e3c"/>
  <rect x="150" y="145" width="18" height="45" rx="3" fill="#7a5230"/>

  <!-- Enemies (slimes) -->
  <ellipse cx="185" cy="85" rx="13" ry="10" fill="#7c3aed" opacity="0.9"/>
  <ellipse cx="185" cy="78" rx="9" ry="7" fill="#8b5cf6"/>
  <circle cx="181" cy="77" r="2.5" fill="white"/>
  <circle cx="189" cy="77" r="2.5" fill="white"/>
  <circle cx="181" cy="77" r="1.2" fill="#111"/>
  <circle cx="189" cy="77" r="1.2" fill="#111"/>

  <ellipse cx="260" cy="125" rx="13" ry="10" fill="#7c3aed" opacity="0.9"/>
  <ellipse cx="260" cy="118" rx="9" ry="7" fill="#8b5cf6"/>
  <circle cx="256" cy="117" r="2.5" fill="white"/>
  <circle cx="264" cy="117" r="2.5" fill="white"/>
  <circle cx="256" cy="117" r="1.2" fill="#111"/>
  <circle cx="264" cy="117" r="1.2" fill="#111"/>

  <ellipse cx="200" cy="158" rx="13" ry="10" fill="#7c3aed" opacity="0.7"/>
  <ellipse cx="200" cy="151" rx="9" ry="7" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="196" cy="150" r="2.5" fill="white" opacity="0.8"/>
  <circle cx="204" cy="150" r="2.5" fill="white" opacity="0.8"/>

  <!-- Ball -->
  <circle cx="210" cy="178" r="9" fill="white" opacity="0.95"/>
  <circle cx="207" cy="175" r="3" fill="#e0e0ff" opacity="0.5"/>
  <!-- Ball trail -->
  <circle cx="195" cy="162" r="6" fill="white" opacity="0.4"/>
  <circle cx="183" cy="148" r="4" fill="white" opacity="0.28"/>
  <circle cx="175" cy="132" r="3" fill="white" opacity="0.18"/>
  <circle cx="172" cy="117" r="2" fill="white" opacity="0.1"/>

  <!-- Trajectory dotted line -->
  <line x1="210" y1="178" x2="175" y2="80" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>

  <text x="200" y="220" font-family="Arial" font-weight="bold" font-size="15" fill="#fbbf24" text-anchor="middle">🎱 공튕기기 3D</text>
</svg>
