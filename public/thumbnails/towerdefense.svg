<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a20"/>
      <stop offset="100%" stop-color="#0a1a0a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#bg)"/>

  <!-- Grid tiles (buildable - green) -->
  <rect x="10"  y="10"  width="34" height="34" rx="2" fill="#1e2d1e" stroke="#000" stroke-width="0.5"/>
  <rect x="46"  y="10"  width="34" height="34" rx="2" fill="#1e2d1e" stroke="#000" stroke-width="0.5"/>
  <rect x="10"  y="46"  width="34" height="34" rx="2" fill="#3d2b1a" stroke="#000" stroke-width="0.5"/>
  <rect x="46"  y="46"  width="34" height="34" rx="2" fill="#3d2b1a" stroke="#000" stroke-width="0.5"/>
  <rect x="82"  y="46"  width="34" height="34" rx="2" fill="#3d2b1a" stroke="#000" stroke-width="0.5"/>
  <rect x="82"  y="82"  width="34" height="34" rx="2" fill="#1e2d1e" stroke="#000" stroke-width="0.5"/>

  <!-- Path indicator -->
  <rect x="10"  y="46"  width="108" height="34" rx="2" fill="#3d2b1a"/>
  <rect x="82"  y="46"  width="34"  height="108" rx="2" fill="#3d2b1a"/>
  <rect x="82"  y="118" width="108" height="34" rx="2" fill="#3d2b1a"/>

  <!-- Archer tower (green) -->
  <rect x="16"  y="16"  width="22" height="22" rx="3" fill="#2c3d2c" stroke="#2ecc71" stroke-width="1.5"/>
  <circle cx="27" cy="27" r="7" fill="#2ecc71"/>
  <rect cx="27" cy="27" x="27" y="22" width="12" height="5" fill="#2ecc71" transform="rotate(-30,27,27)"/>
  <text x="27" y="31" font-family="Arial" font-weight="bold" font-size="8" fill="white" text-anchor="middle">1</text>

  <!-- Freeze tower (blue) -->
  <rect x="52"  y="16"  width="22" height="22" rx="3" fill="#1a2a3d" stroke="#74b9ff" stroke-width="1.5"/>
  <circle cx="63" cy="27" r="7" fill="#74b9ff"/>
  <text x="63" y="31" font-family="Arial" font-weight="bold" font-size="8" fill="white" text-anchor="middle">2</text>

  <!-- Enemies on path -->
  <circle cx="46"  cy="63" r="9"  fill="#fd9644"/>
  <circle cx="65"  cy="63" r="9"  fill="#ffeaa7"/>
  <circle cx="99"  cy="63" r="9"  fill="#fd9644"/>

  <circle cx="99"  cy="90"  r="11" fill="#a29bfe" stroke="rgba(255,255,255,0.4)" stroke-width="1.5"/>
  <circle cx="99"  cy="120" r="11" fill="#a29bfe"/>
  <circle cx="99"  cy="148" r="14" fill="#ff4757" stroke="rgba(255,255,255,0.5)" stroke-width="2"/>

  <!-- HP bars -->
  <rect x="37" y="52" width="18" height="3" fill="#333"/>
  <rect x="37" y="52" width="14" height="3" fill="#2ecc71"/>
  <rect x="56" y="52" width="18" height="3" fill="#333"/>
  <rect x="56" y="52" width="9"  height="3" fill="#f39c12"/>
  <rect x="90" y="52" width="18" height="3" fill="#333"/>
  <rect x="90" y="52" width="16" height="3" fill="#2ecc71"/>

  <!-- Projectile -->
  <circle cx="40"  cy="35" r="3" fill="#2ecc71"/>
  <circle cx="75"  cy="50" r="4" fill="#e17055"/>

  <!-- Large decorative castle / info area right side -->
  <rect x="180" y="15" width="205" height="195" rx="8" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Stage info mockup -->
  <text x="283" y="38" font-family="Arial" font-weight="bold" font-size="13" fill="#74b9ff" text-anchor="middle">STAGE 1~15</text>
  <text x="283" y="56" font-family="Arial" font-size="10" fill="#aaa" text-anchor="middle">평화로운 초원 → 마지막 성전</text>

  <!-- Tower icons row -->
  <text x="215" y="90" font-family="sans-serif" font-size="22">🏹</text>
  <text x="268" y="90" font-family="sans-serif" font-size="22">❄️</text>
  <text x="321" y="90" font-family="sans-serif" font-size="22">💣</text>
  <text x="226" y="104" font-family="Arial" font-size="9" fill="#2ecc71" text-anchor="middle">궁수</text>
  <text x="279" y="104" font-family="Arial" font-size="9" fill="#74b9ff" text-anchor="middle">얼음</text>
  <text x="332" y="104" font-family="Arial" font-size="9" fill="#e17055" text-anchor="middle">대포</text>

  <!-- Enemy types -->
  <circle cx="215" cy="135" r="8"  fill="#fd9644"/>
  <circle cx="245" cy="135" r="7"  fill="#ffeaa7"/>
  <circle cx="272" cy="135" r="10" fill="#a29bfe"/>
  <circle cx="304" cy="135" r="12" fill="#ff4757" stroke="#ff0000" stroke-width="1.5"/>
  <text x="215" y="151" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">기본</text>
  <text x="245" y="151" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">고속</text>
  <text x="272" y="151" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">중장갑</text>
  <text x="304" y="151" font-family="Arial" font-size="8" fill="#aaa" text-anchor="middle">보스</text>

  <!-- HUD mockup -->
  <rect x="183" y="165" width="199" height="40" rx="4" fill="rgba(5,5,20,0.8)" stroke="#1a2040" stroke-width="1"/>
  <text x="192" y="183" font-family="Arial" font-size="9" fill="#74b9ff">STAGE 1</text>
  <text x="275" y="183" font-family="Arial" font-size="9" fill="#ff6b6b" text-anchor="middle">❤️ 20</text>
  <text x="372" y="183" font-family="Arial" font-size="9" fill="#ffd700" text-anchor="end">💰 200</text>
  <text x="192" y="197" font-family="Arial" font-size="8" fill="#aaa">웨이브 1/1</text>

  <text x="200" y="218" font-family="Arial" font-weight="bold" font-size="15" fill="#74b9ff" text-anchor="middle">🏰 Tower Defense</text>
</svg>
