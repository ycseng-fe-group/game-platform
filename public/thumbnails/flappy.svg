<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225" viewBox="0 0 400 225">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>
  <rect width="400" height="225" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="30" cy="30" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="90" cy="50" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="200" cy="20" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="320" cy="40" r="1.5" fill="rgba(255,255,255,0.3)"/>
  <circle cx="370" cy="25" r="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Pipes -->
  <rect x="120" y="0" width="52" height="85" rx="4" fill="#4ade80"/>
  <rect x="116" y="65" width="60" height="20" rx="4" fill="#22c55e"/>
  <rect x="120" y="150" width="52" height="75" rx="4" fill="#4ade80"/>
  <rect x="116" y="150" width="60" height="20" rx="4" fill="#22c55e"/>
  <rect x="270" y="0" width="52" height="60" rx="4" fill="#4ade80"/>
  <rect x="266" y="40" width="60" height="20" rx="4" fill="#22c55e"/>
  <rect x="270" y="155" width="52" height="70" rx="4" fill="#4ade80"/>
  <rect x="266" y="155" width="60" height="20" rx="4" fill="#22c55e"/>
  <!-- Ground -->
  <rect x="0" y="195" width="400" height="30" fill="#1a1a24"/>
  <!-- Bird -->
  <text x="65" y="130" font-size="36" text-anchor="middle">🐦</text>
  <!-- Score -->
  <text x="200" y="55" font-family="Arial" font-weight="bold" font-size="28" fill="white" text-anchor="middle">3</text>
  <text x="200" y="220" font-family="Arial" font-weight="bold" font-size="16" fill="#a78bfa" text-anchor="middle">🐦 Flappy Bird</text>
</svg>
